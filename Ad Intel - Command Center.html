    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {

        const bytes = new Uint8Array(binaryStr.length);

            const reader = ds.readable.getReader();

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.

      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>

    // attributes through, so match the full opening tag. slice() rather than

    // DOMParser/replaceWith are inert per spec — re-create each with

    const doc = new DOMParser().parseFromString(template, 'text/html');

      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"74c104fe-2369-4733-91c1-29927143948d\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>\n  @keyframes freshpulse { 0%,100% { opacity: 1 } 50% { opacity: .35 } }\n  @keyframes fadein { from { opacity: 0 } to { opacity: 1 } }\n  * { box-sizing: border-box; }\n  ::selection { background: rgba(232,163,61,.28); }\n  ::-webkit-scrollbar { width: 10px; height: 10px; }\n  ::-webkit-scrollbar-track { background: transparent; }\n  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.09); border-radius: 0; border: 3px solid #0B0C0E; }\n  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.16); }\n  input::placeholder { color: #4A4E54; }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;background:#0B0C0E;color:#E7E8EA;font-family:system-ui,ui-sans-serif,-apple-system,sans-serif;font-size:13px;line-height:1.45;-webkit-font-smoothing:antialiased;letter-spacing:.1px;\">\n\n  <!-- ============ TOP CHROME ============ -->\n  <div style=\"position:sticky;top:0;z-index:40;display:flex;align-items:center;height:44px;padding:0 14px;gap:16px;background:#0B0C0E;border-bottom:1px solid rgba(255,255,255,.09);\">\n    <div style=\"display:flex;align-items:center;gap:9px;padding-right:16px;border-right:1px solid rgba(255,255,255,.08);height:100%;\">\n      <div style=\"width:15px;height:15px;border:1.5px solid #E8A33D;transform:rotate(45deg);\"><\u002Fdiv>\n      <span style=\"font-family:ui-monospace,'SF Mono','JetBrains Mono',monospace;font-size:12px;font-weight:600;letter-spacing:1.5px;color:#E7E8EA;\">ADINTEL<\u002Fspan>\n      <span style=\"font-family:ui-monospace,'SF Mono',monospace;font-size:10px;color:#4A4E54;letter-spacing:.5px;\">v2.4<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:stretch;height:100%;gap:2px;\">\n      <sc-for list=\"{{ navTabs }}\" as=\"tab\" hint-placeholder-count=\"5\">\n        <button onclick=\"{{ tab.onClick }}\" style=\"background:{{ tab.bg }};border:none;border-bottom:2px solid {{ tab.border }};color:{{ tab.color }};font-family:system-ui,sans-serif;font-size:11.5px;letter-spacing:.4px;padding:0 13px;height:100%;cursor:pointer;transition:color .13s ease-out;text-transform:uppercase;\" style-hover=\"color:#E7E8EA;\">{{ tab.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"flex:1;\"><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:8px;height:26px;padding:0 10px;min-width:280px;background:#101216;border:1px solid rgba(255,255,255,.08);\">\n      <span style=\"color:#5A5E64;font-size:12px;\">⌕<\u002Fspan>\n      <input id=\"ai-search\" value=\"{{ query }}\" oninput=\"{{ onQuery }}\" placeholder=\"Search headlines, pages, domains…\" style=\"flex:1;background:transparent;border:none;outline:none;color:#E7E8EA;font-family:system-ui,sans-serif;font-size:12px;\">\n      <kbd style=\"font-family:ui-monospace,'SF Mono',monospace;font-size:10px;color:#5A5E64;border:1px solid rgba(255,255,255,.1);padding:1px 4px;\">/<\u002Fkbd>\n    <\u002Fdiv>\n    <button onclick=\"{{ openPalette }}\" style=\"display:flex;align-items:center;gap:6px;height:26px;padding:0 9px;background:#101216;border:1px solid rgba(255,255,255,.08);color:#8A8E94;font-family:ui-monospace,'SF Mono',monospace;font-size:10.5px;cursor:pointer;\" style-hover=\"border-color:rgba(255,255,255,.18);color:#E7E8EA;\">⌘K<\u002Fbutton>\n    <div style=\"display:flex;align-items:center;gap:7px;padding-left:14px;border-left:1px solid rgba(255,255,255,.08);height:100%;\">\n      <div style=\"display:flex;align-items:center;gap:5px;\">\n        <span style=\"width:6px;height:6px;border-radius:50%;background:#E8A33D;box-shadow:0 0 6px rgba(232,163,61,.6);\"><\u002Fspan>\n        <span style=\"font-family:ui-monospace,'SF Mono',monospace;font-size:10.5px;color:#8A8E94;\">LIVE<\u002Fspan>\n      <\u002Fdiv>\n      <span style=\"font-family:ui-monospace,'SF Mono',monospace;font-size:10.5px;color:#5A5E64;\">{{ lastScrape }}<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ FRESH FINDS ============ -->\n  <sc-if value=\"{{ isFresh }}\" hint-placeholder-val=\"{{ true }}\">\n  <div>\n    <!-- STATUS TICKER STRIP -->\n    <div style=\"display:flex;align-items:stretch;height:74px;background:#0D0E11;border-bottom:1px solid rgba(255,255,255,.09);\">\n      <sc-for list=\"{{ metrics }}\" as=\"m\" hint-placeholder-count=\"5\">\n        <div style=\"display:flex;flex-direction:column;justify-content:center;padding:0 26px;border-right:1px solid rgba(255,255,255,.06);min-width:150px;\">\n          <div style=\"display:flex;align-items:baseline;gap:7px;\">\n            <span style=\"font-family:ui-monospace,'SF Mono','JetBrains Mono',monospace;font-size:27px;font-weight:500;letter-spacing:-.5px;color:{{ m.color }};font-variant-numeric:tabular-nums;\">{{ m.value }}<\u002Fspan>\n            <span style=\"font-family:ui-monospace,'SF Mono',monospace;font-size:11px;color:{{ m.deltaColor }};\">{{ m.delta }}<\u002Fspan>\n          <\u002Fdiv>\n          <span style=\"font-size:10px;letter-spacing:1px;color:#6C7076;text-transform:uppercase;margin-top:2px;\">{{ m.label }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <div style=\"flex:1;display:flex;align-items:center;justify-content:flex-end;padding:0 24px;gap:20px;\">\n        <sc-for list=\"{{ vertMix }}\" as=\"v\" hint-placeholder-count=\"4\">\n          <div style=\"display:flex;flex-direction:column;gap:5px;min-width:88px;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;\">\n              <span style=\"font-size:10px;color:#8A8E94;letter-spacing:.3px;\">{{ v.label }}<\u002Fspan>\n              <span style=\"font-family:ui-monospace,'SF Mono',monospace;font-size:10px;color:#6C7076;\">{{ v.pct }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"height:3px;background:rgba(255,255,255,.06);\"><div style=\"height:100%;width:{{ v.pct }};background:#5A5E64;\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;align-items:stretch;min-height:calc(100vh - 118px);\">\n      <!-- LEFT FILTER RAIL -->\n      <div style=\"width:236px;flex-shrink:0;background:#0D0E11;border-right:1px solid rgba(255,255,255,.09);padding:0;\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;height:34px;padding:0 14px;border-bottom:1px solid rgba(255,255,255,.06);\">\n          <span style=\"font-family:ui-monospace,'SF Mono',monospace;font-size:10px;letter-spacing:1.5px;color:#6C7076;\">FILTERS<\u002Fspan>\n          <button onclick=\"{{ clearFilters }}\" style=\"background:none;border:none;color:{{ clearColor }};font-family:ui-monospace,monospace;font-size:9.5px;letter-spacing:.5px;cursor:pointer;\">CLEAR ({{ activeFilterCount }})<\u002Fbutton>\n        <\u002Fdiv>\n        <sc-for list=\"{{ filterGroups }}\" as=\"g\" hint-placeholder-count=\"5\">\n          <div style=\"border-bottom:1px solid rgba(255,255,255,.06);padding:11px 0 12px;\">\n            <div style=\"padding:0 14px 8px;font-size:9.5px;letter-spacing:1.2px;color:#5A5E64;text-transform:uppercase;\">{{ g.title }}<\u002Fdiv>\n            <sc-for list=\"{{ g.options }}\" as=\"opt\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ opt.onToggle }}\" style=\"display:flex;align-items:center;gap:9px;width:100%;padding:4px 14px;background:{{ opt.rowBg }};border:none;cursor:pointer;text-align:left;transition:background .12s ease-out;\" style-hover=\"background:rgba(255,255,255,.03);\">\n                <span style=\"width:11px;height:11px;flex-shrink:0;border:1px solid {{ opt.boxBorder }};background:{{ opt.boxBg }};display:flex;align-items:center;justify-content:center;font-size:8px;color:#0B0C0E;line-height:1;\">{{ opt.mark }}<\u002Fspan>\n                <span style=\"flex:1;font-size:11.5px;color:{{ opt.textColor }};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ opt.label }}<\u002Fspan>\n                <span style=\"font-family:ui-monospace,'SF Mono',monospace;font-size:10px;color:#5A5E64;font-variant-numeric:tabular-nums;\">{{ opt.count }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <div style=\"padding:11px 14px;\">\n          <div style=\"font-size:9.5px;letter-spacing:1.2px;color:#5A5E64;text-transform:uppercase;margin-bottom:8px;\">DATE RANGE<\u002Fdiv>\n          <div style=\"display:flex;gap:1px;background:rgba(255,255,255,.06);\">\n            <sc-for list=\"{{ dateRanges }}\" as=\"d\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ d.onClick }}\" style=\"flex:1;padding:5px 0;background:{{ d.bg }};border:none;color:{{ d.color }};font-family:ui-monospace,'SF Mono',monospace;font-size:10px;cursor:pointer;\">{{ d.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- MAIN FEED -->\n      <div style=\"flex:1;min-width:0;background:#0B0C0E;overflow-x:auto;\">\n        <!-- feed toolbar -->\n        <div style=\"display:flex;align-items:center;justify-content:space-between;height:34px;padding:0 16px;border-bottom:1px solid rgba(255,255,255,.06);\">\n          <div style=\"display:flex;align-items:center;gap:12px;\">\n            <span style=\"font-family:ui-monospace,'SF Mono',monospace;font-size:11px;color:#8A8E94;font-variant-numeric:tabular-nums;\">{{ resultCount }} <span style=\"color:#5A5E64;\">ads<\u002Fspan><\u002Fspan>\n            <span style=\"color:#2E3136;\">|<\u002Fspan>\n            <span style=\"font-size:10.5px;color:#5A5E64;\">sorted by<\u002Fspan>\n            <sc-for list=\"{{ sortOptions }}\" as=\"s\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ s.onClick }}\" style=\"background:none;border:none;color:{{ s.color }};font-size:10.5px;letter-spacing:.3px;cursor:pointer;display:flex;align-items:center;gap:3px;\">{{ s.label }}{{ s.arrow }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:5px;font-family:ui-monospace,'SF Mono',monospace;font-size:10px;color:#5A5E64;\">\n            <kbd style=\"border:1px solid rgba(255,255,255,.1);padding:1px 4px;\">J<\u002Fkbd><kbd style=\"border:1px solid rgba(255,255,255,.1);padding:1px 4px;\">K<\u002Fkbd><span style=\"color:#45484D;\">move<\u002Fspan>\n            <kbd style=\"border:1px solid rgba(255,255,255,.1);padding:1px 4px;margin-left:6px;\">↵<\u002Fkbd><span style=\"color:#45484D;\">open<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- column header -->\n        <div style=\"display:flex;align-items:center;height:26px;padding:0 16px 0 16px;border-bottom:1px solid rgba(255,255,255,.06);font-size:9.5px;letter-spacing:1px;color:#5A5E64;text-transform:uppercase;position:sticky;top:44px;background:#0B0C0E;z-index:5;min-width:940px;\">\n          <div style=\"width:56px;flex-shrink:0;\"><\u002Fdiv>\n          <div style=\"width:184px;flex-shrink:0;\">Page / Domain<\u002Fdiv>\n          <div style=\"flex:1;min-width:0;\">Headline<\u002Fdiv>\n          <div style=\"width:70px;flex-shrink:0;text-align:center;\">Format<\u002Fdiv>\n          <div style=\"width:74px;flex-shrink:0;text-align:right;\">Days Run<\u002Fdiv>\n          <div style=\"width:96px;flex-shrink:0;padding-left:16px;\">Vertical<\u002Fdiv>\n          <div style=\"width:62px;flex-shrink:0;text-align:center;\">Geo<\u002Fdiv>\n          <div style=\"width:66px;flex-shrink:0;text-align:center;\">Platform<\u002Fdiv>\n        <\u002Fdiv>\n        <!-- rows -->\n        <sc-for list=\"{{ rows }}\" as=\"row\" hint-placeholder-count=\"10\">\n          <div onclick=\"{{ row.onOpen }}\" onmouseenter=\"{{ row.onHover }}\" style=\"position:relative;display:flex;align-items:center;min-height:56px;min-width:940px;padding:0 16px;border-bottom:1px solid rgba(255,255,255,.045);background:{{ row.bg }};cursor:pointer;transition:background .1s ease-out;\" style-hover=\"background:rgba(255,255,255,.028);\">\n            <div style=\"position:absolute;left:0;top:0;bottom:0;width:2px;background:{{ row.accentBar }};\"><\u002Fdiv>\n            <!-- thumb -->\n            <div style=\"width:56px;flex-shrink:0;padding-right:12px;\">\n              <div style=\"position:relative;width:44px;height:44px;background:{{ row.thumbBg }};border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;overflow:hidden;\">\n                <div style=\"position:absolute;inset:0;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.04) 0px,rgba(255,255,255,.04) 1px,transparent 1px,transparent 7px);\"><\u002Fdiv>\n                <sc-if value=\"{{ row.isVideo }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"position:relative;width:0;height:0;border-style:solid;border-width:6px 0 6px 10px;border-color:transparent transparent transparent rgba(255,255,255,.82);\"><\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ row.isImage }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"position:relative;width:14px;height:14px;border:1.5px solid rgba(255,255,255,.5);\"><\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <!-- page/domain -->\n            <div style=\"width:184px;flex-shrink:0;padding-right:14px;min-width:0;\">\n              <div style=\"display:flex;align-items:center;gap:6px;\">\n                <sc-if value=\"{{ row.isFresh }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"width:6px;height:6px;border-radius:50%;background:#E8A33D;flex-shrink:0;animation:freshpulse 2.4s ease-in-out infinite;\"><\u002Fspan><\u002Fsc-if>\n                <span style=\"font-size:12.5px;color:#E7E8EA;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ row.pageName }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-family:ui-monospace,'SF Mono',monospace;font-size:10.5px;color:#6C7076;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ row.domain }}<\u002Fdiv>\n            <\u002Fdiv>\n            <!-- headline -->\n            <div style=\"flex:1;min-width:0;padding-right:16px;\">\n              <div style=\"font-size:12.5px;color:#C6C9CE;line-height:1.4;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;\">{{ row.headline }}<\u002Fdiv>\n            <\u002Fdiv>\n            <!-- format -->\n            <div style=\"width:70px;flex-shrink:0;display:flex;justify-content:center;\">\n              <span style=\"font-family:ui-monospace,'SF Mono',monospace;font-size:9.5px;letter-spacing:.5px;color:{{ row.fmtColor }};border:1px solid {{ row.fmtBorder }};padding:2px 6px;\">{{ row.format }}<\u002Fspan>\n            <\u002Fdiv>\n            <!-- days -->\n            <div style=\"width:74px;flex-shrink:0;text-align:right;\">\n              <span style=\"font-family:ui-monospace,'SF Mono','JetBrains Mono',monospace;font-size:14px;color:{{ row.daysColor }};font-variant-numeric:tabular-nums;\">{{ row.daysRunning }}<\u002Fspan>\n              <span style=\"font-size:9px;color:#5A5E64;margin-left:2px;\">d<\u002Fspan>\n              <div style=\"height:2px;margin-top:4px;background:rgba(255,255,255,.06);\"><div style=\"height:100%;width:{{ row.daysBar }};background:{{ row.daysBarColor }};\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <!-- vertical -->\n            <div style=\"width:96px;flex-shrink:0;padding-left:16px;\">\n              <span style=\"font-size:10.5px;color:#9CA0A6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;\">{{ row.vertical }}<\u002Fspan>\n            <\u002Fdiv>\n            <!-- ge hite-space:nowrap;\">{{ row.headline }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div style=\"width:80px;text-align:center;\"><span style=\"font-family:ui-monospace,monospace;font-size:9.5px;color:{{ row.fmtColor }};border:1px solid {{ row.fmtBorder }};padding:2px 6px;\">{{ row.format }}<\u002Fspan><\u002Fdiv>\n        <div style=\"width:90px;text-align:right;font-family:ui-monospace,monospace;font-size:14px;color:{{ row.daysColor }};font-variant-numeric:tabular-nums;\">{{ row.daysRunning }}<span style=\"font-size:9px;color:#5A5E64;\">d<\u002Fspan><\u002Fdiv>\n        <div style=\"width:120px;padding-left:20px;font-size:11px;color:#9CA0A6;\">{{ row.vertical }}<\u002Fdiv>\n        <div style=\"width:60px;text-align:center;font-family:ui-monospace,monospace;font-size:11px;color:#B6B9BE;\">{{ row.country }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ PIPELINE BOARD ============ -->\n  <sc-if value=\"{{ isPipeline }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"padding:0;\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;height:44px;padding:0 20px;border-bottom:1px solid rgba(255,255,255,.06);\">\n      <span style=\"font-family:ui-monospace,monospace;font-size:12px;letter-spacing:1px;color:#E7E8EA;\">CONTENT PIPELINE<\u002Fspan>\n      <span style=\"font-family:ui-monospace,monospace;font-size:10.5px;color:#5A5E64;\">drag cards between columns · status syncs to record<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:1px;background:rgba(255,255,255,.06);min-height:calc(100vh - 89px);\">\n      <sc-for list=\"{{ pipeline }}\" as=\"col\" hint-placeholder-count=\"3\">\n        <div ondragover=\"{{ col.onDragOver }}\" ondrop=\"{{ col.onDrop }}\" style=\"flex:1;background:#0B0C0E;display:flex;flex-direction:column;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;height:38px;padding:0 16px;border-bottom:1px solid rgba(255,255,255,.06);background:#0D0E11;\">\n            <div style=\"display:flex;align-items:center;gap:9px;\"><span style=\"width:9px;height:9px;border-radius:50%;border:1.5px solid {{ col.dotBorder }};background:{{ col.dotBg }};\"><\u002Fspan><span style=\"font-size:11.5px;letter-spacing:.5px;color:#C6C9CE;text-transform:uppercase;\">{{ col.title }}<\u002Fspan><\u002Fdiv>\n            <span style=\"font-family:ui-monospace,monospace;font-size:12px;color:#6C7076;font-variant-numeric:tabular-nums;\">{{ col.count }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:12px;display:flex;flex-direction:column;gap:10px;flex:1;\">\n            <sc-for list=\"{{ col.cards }}\" as=\"card\" hint-placeholder-count=\"3\">\n              <div draggable=\"true\" ondragstart=\"{{ card.onDragStart }}\" onclick=\"{{ card.onOpen }}\" style=\"background:#101216;border:1px solid rgba(255,255,255,.09);border-left:2px solid {{ card.accent }};padding:11px 12px;cursor:grab;transition:border-color .12s ease-out;\" style-hover=\"border-color:rgba(255,255,255,.2);\">\n                <div style=\"display:flex;gap:10px;\">\n                  <div style=\"position:relative;width:38px;height:38px;flex-shrink:0;background:{{ card.thumbBg }};border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;overflow:hidden;\"><div style=\"position:absolute;inset:0;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.04) 0px,rgba(255,255,255,.04) 1px,transparent 1px,transparent 6px);\"><\u002Fdiv><sc-if value=\"{{ card.isVideo }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"position:relative;width:0;height:0;border-style:solid;border-width:5px 0 5px 8px;border-color:transparent transparent transparent rgba(255,255,255,.8);\"><\u002Fdiv><\u002Fsc-if><\u002Fdiv>\n                  <div style=\"min-width:0;flex:1;\"><div style=\"font-size:11.5px;color:#C6C9CE;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;\">{{ card.headline }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:10px;\">\n                  <span style=\"font-family:ui-monospace,monospace;font-size:9.5px;color:#8A8E94;\">{{ card.vertical }}<\u002Fspan>\n                  <div style=\"display:flex;align-items:center;gap:6px;\"><span style=\"font-family:ui-monospace,monospace;font-size:9px;color:#5A5E64;\">{{ card.domain }}<\u002Fspan><span style=\"width:18px;height:18px;border-radius:50%;background:{{ card.avBg }};color:{{ card.avColor }};display:flex;align-items:center;justify-content:center;font-family:ui-monospace,monospace;font-size:8px;font-weight:600;\">{{ card.initials }}<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ CONTROL ROOM ============ -->\n  <sc-if value=\"{{ isSettings }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"padding:0;max-width:1100px;\">\n    <div style=\"display:flex;align-items:center;height:44px;padding:0 24px;border-bottom:1px solid rgba(255,255,255,.06);\"><span style=\"font-family:ui-monospace,monospace;font-size:12px;letter-spacing:1px;color:#E7E8EA;\">CONTROL ROOM<\u002Fspan><\u002Fdiv>\n    <!-- schedule -->\n    <div style=\"padding:22px 24px;border-bottom:1px solid rgba(255,255,255,.06);\">\n      <div style=\"font-size:9.5px;letter-spacing:1.2px;color:#5A5E64;text-transform:uppercase;margin-bottom:12px;\">Scrape Schedule<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:20px;\">\n        <div style=\"display:flex;gap:1px;background:rgba(255,255,255,.06);\">\n          <sc-for list=\"{{ cadences }}\" as=\"c\" hint-placeholder-count=\"4\"><button onclick=\"{{ c.onClick }}\" style=\"padding:7px 14px;background:{{ c.bg }};border:none;color:{{ c.color }};font-family:ui-monospace,monospace;font-size:11px;cursor:pointer;\">{{ c.label }}<\u002Fbutton><\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:24px;\">\n          <div><div style=\"font-size:9px;letter-spacing:.8px;color:#5A5E64;text-transform:uppercase;\">Next Run<\u002Fdiv><div style=\"font-family:ui-monospace,monospace;font-size:14px;color:#E8A33D;margin-top:3px;\">{{ nextRun }}<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:9px;letter-spacing:.8px;color:#5A5E64;text-transform:uppercase;\">Last Run<\u002Fdiv><div style=\"font-family:ui-monospace,monospace;font-size:14px;color:#C6C9CE;margin-top:3px;\">{{ lastRunAgo }}<\u002Fdiv><\u002Fdiv>\n          <div><div style=\"font-size:9px;letter-spacing:.8px;color:#5A5E64;text-transform:uppercase;\">New / Errors<\u002Fdiv><div style=\"font-family:ui-monospace,monospace;font-size:14px;color:#C6C9CE;margin-top:3px;\"><span style=\"color:#E8A33D;\">+{{ lastNew }}<\u002Fspan> / {{ lastErrors }}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- domains table -->\n    <div style=\"padding:22px 24px;\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;\"><div style=\"font-size:9.5px;letter-spacing:1.2px;color:#5A5E64;text-transform:uppercase;\">Tracked Domains / Queries<\u002Fdiv><button onclick=\"{{ addDomain }}\" style=\"font-family:ui-monospace,monospace;font-size:10.5px;color:#0B0C0E;background:#E8A33D;border:none;padding:5px 11px;cursor:pointer;\">+ ADD DOMAIN<\u002Fbutton><\u002Fdiv>\n      <div style=\"border:1px solid rgba(255,255,255,.08);\">\n        <div style=\"display:flex;align-items:center;height:28px;padding:0 14px;background:#0D0E11;border-bottom:1px solid rgba(255,255,255,.06);font-size:9.5px;letter-spacing:1px;color:#5A5E64;text-transform:uppercase;\"><div style=\"flex:1;\">Domain / Page<\u002Fdiv><div style=\"width:120px;\">Vertical<\u002Fdiv><div style=\"width:80px;text-align:center;\">Country<\u002Fdiv><div style=\"width:90px;text-align:right;\">Max Ads<\u002Fdiv><div style=\"width:80px;text-align:center;\">Ads Held<\u002Fdiv><div style=\"width:90px;text-align:center;\">Status<\u002Fdiv><\u002Fdiv>\n        <sc-for list=\"{{ trackedDomains }}\" as=\"td\" hint-placeholder-count=\"6\">\n          <div style=\"display:flex;align-items:center;height:44px;padding:0 14px;border-bottom:1px solid rgba(255,255,255,.045);\" style-hover=\"background:rgba(255,255,255,.022);\">\n            <div style=\"flex:1;min-width:0;\"><div style=\"font-size:12px;color:#E7E8EA;\">{{ td.pageName }}<\u002Fdiv><div style=\"font-family:ui-monospace,monospace;font-size:10px;color:#6C7076;\">{{ td.domain }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"width:120px;font-size:11px;color:#9CA0A6;\">{{ td.vertical }}<\u002Fdiv>\n            <div style=\"width:80px;text-align:center;font-family:ui-monospace,monospace;font-size:11px;color:#B6B9BE;\">{{ td.country }}<\u002Fdiv>\n            <div style=\"width:90px;text-align:right;font-family:ui-monospace,monospace;font-size:13px;color:#C6C9CE;font-variant-numeric:tabular-nums;\">{{ td.maxAds }}<\u002Fdiv>\n            <div style=\"width:80px;text-align:center;font-family:ui-monospace,monospace;font-size:13px;color:#E7E8EA;font-variant-numeric:tabular-nums;\">{{ td.held }}<\u002Fdiv>\n            <div style=\"width:90px;text-align:center;\"><button onclick=\"{{ td.onToggle }}\" style=\"display:inline-flex;align-items:center;gap:5px;background:none;border:1px solid {{ td.stBorder }};padding:3px 8px;cursor:pointer;\"><span style=\"width:6px;height:6px;border-radius:50%;background:{{ td.stDot }};\"><\u002Fspan><span style=\"font-family:ui-monospace,monospace;font-size:9.5px;color:{{ td.stColor }};\">{{ td.stLabel }}<\u002Fspan><\u002Fbutton><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ COMMAND PALETTE ============ -->\n  <sc-if value=\"{{ paletteOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div onclick=\"{{ closePalette }}\" style=\"position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.6);display:flex;align-items:flex-start;justify-content:center;padding-top:120px;animation:fadein .12s ease-out;\">\n    <div onclick=\"{{ stop }}\" style=\"width:560px;background:#101216;border:1px solid rgba(255,255,255,.14);box-shadow:0 24px 60px rgba(0,0,0,.6);\">\n      <div style=\"display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);\">\n        <span style=\"color:#5A5E64;\">⌕<\u002Fspan>\n        <input id=\"ai-palette\" value=\"{{ paletteQuery }}\" oninput=\"{{ onPaletteQuery }}\" placeholder=\"Jump to action, view, or ad…\" style=\"flex:1;background:transparent;border:none;outline:none;color:#E7E8EA;font-size:14px;font-family:system-ui,sans-serif;\">\n        <kbd style=\"font-family:ui-monospace,monospace;font-size:10px;color:#5A5E64;border:1px solid rgba(255,255,255,.1);padding:1px 5px;\">ESC<\u002Fkbd>\n      <\u002Fdiv>\n      <div style=\"max-height:340px;overflow-y:auto;padding:6px;\">\n        <sc-for list=\"{{ paletteItems }}\" as=\"pi\" hint-placeholder-count=\"6\">\n          <button onclick=\"{{ pi.onClick }}\" style=\"display:flex;align-items:center;gap:12px;width:100%;padding:9px 11px;background:{{ pi.bg }};border:none;cursor:pointer;text-align:left;\" style-hover=\"background:rgba(255,255,255,.05);\">\n            <span style=\"font-family:ui-monospace,monospace;font-size:10px;color:{{ pi.kindColor }};width:52px;flex-shrink:0;\">{{ pi.kind }}<\u002Fspan>\n            <span style=\"flex:1;font-size:13px;color:#E7E8EA;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ pi.label }}<\u002Fspan>\n            <span style=\"font-family:ui-monospace,monospace;font-size:10px;color:#5A5E64;\">{{ pi.hint }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = {\n    view: 'fresh',\n    query: '',\n    sort: 'fresh',      // fresh | days | page\n    sortDir: 'desc',\n    filters: { domain: [], vertical: [], country: [], format: [], status: [] },\n    dateRange: 'all',   // 24h | 7d | 30d | all\n    selIndex: 0,\n    detailId: null,\n    compDomain: 'analogaudiohub.com',\n    cadence: 'daily',\n    paletteOpen: false,\n    paletteQuery: '',\n    dragId: null,\n    saveFlash: false,\n  };\n\n  NOW = new Date('2026-07-06T09:00:00Z').getTime();\n  OWNERS = [\n    { name: 'Mara K.', initials: 'MK' },\n    { name: 'Devin R.', initials: 'DR' },\n    { name: 'Priya S.', initials: 'PS' },\n    { name: 'Ari L.', initials: 'AL' },\n  ];\n\n  componentDidMount() {\n    this.ads = this._seed();\n    this.forceUpdate();\n    this._key = (e) => this._onKey(e);\n    window.addEventListener('keydown', this._key);\n  }\n  componentWillUnmount() { window.removeEventListener('keydown', this._key); }\n\n  _onKey(e) {\n    const tag = (e.target && e.target.tagName) || '';\n    const typing = tag === 'INPUT' || tag === 'TEXTAREA';\n    // Cmd/Ctrl+K\n    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {\n      e.preventDefault();\n      this.setState({ paletteOpen: true, paletteQuery: '' });\n      setTimeout(() => { const el = document.getElementById('ai-palette'); if (el) el.focus(); }, 30);\n      return;\n    }\n    if (e.key === 'Escape') {\n      if (this.state.paletteOpen) { this.setState({ paletteOpen: false }); return; }\n      if (this.state.view === 'detail') { this.setState({ view: 'fresh' }); return; }\n    }\n    if (typing) return;\n    if (e.key === '/') {\n      e.preventDefault();\n      const el = document.getElementById('ai-search'); if (el) el.focus();\n      return;\n    }\n    if (this.state.view === 'fresh') {\n      const rows = this._filteredAds();\n      if (e.key === 'j' || e.key === 'ArrowDown') { e.preventDefault(); this.setState(s => ({ selIndex: Math.min(rows.length - 1, s.selIndex + 1) })); }\n      else if (e.key === 'k' || e.key === 'ArrowUp') { e.preventDefault(); this.setState(s => ({ selIndex: Math.max(0, s.selIndex - 1) })); }\n      else if (e.key === 'Enter') { const a = rows[this.state.selIndex]; if (a) this._open(a.ad_archive_id); }\n    } else if (this.state.view === 'detail') {\n      if (e.key === 'j') this._stepDetail(1);\n      else if (e.key === 'k') this._stepDetail(-1);\n    }\n  }\n\n  _daysRunning(a) { return Math.max(1, Math.round((this.NOW - new Date(a.start_date).getTime()) / 86400000)); }\n  _hoursSince(iso) { return (this.NOW - new Date(iso).getTime()) / 3600000; }\n  _isFresh(a) { return this._hoursSince(a.first_seen_at) <= 24; }\n  _isNew7(a) { return this._hoursSince(a.first_seen_at) <= 168; }\n\n  _tint(seed) {\n    // deterministic near-neutral dark tint, no rainbow\n    let h = 0; for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) % 360;\n    return `linear-gradient(135deg, hsl(${h},6%,13%), hsl(${(h + 40) % 360},7%,9%))`;\n  }\n\n  _filteredAds() {\n    const f = this.state.filters;\n    const q = this.state.query.trim().toLowerCase();\n    let list = this.ads.filter(a => {\n      if (f.domain.length && !f.domain.includes(a.domain)) return false;\n      if (f.vertical.length && !f.vertical.includes(a.vertical)) return false;\n      if (f.country.length && !f.country.includes(a.country)) return false;\n      if (f.format.length && !f.format.includes(a.display_format)) return false;\n      if (f.status.length && !f.status.includes(a.status)) return false;\n      if (this.state.dateRange === '24h' && !this._isFresh(a)) return false;\n      if (this.state.dateRange === '7d' && !this._isNew7(a)) return false;\n      if (this.state.dateRange === '30d' && this._hoursSince(a.first_seen_at) > 720) return false;\n      if (q) {\n        const hay = (a.title + ' ' + a.page_name + ' ' + a.domain + ' ' + a.vertical + ' ' + a.body_text).toLowerCase();\n        if (!hay.includes(q)) return false;\n      }\n      return true;\n    });\n    const dir = this.state.sortDir === 'desc' ? 1 : -1;\n    list.sort((a, b) => {\n      if (this.state.sort === 'days') return (this._daysRunning(b) - this._daysRunning(a)) * dir;\n      if (this.state.sort === 'page') return a.page_name.localeCompare(b.page_name) * -dir;\n      return (new Date(b.first_seen_at) - new Date(a.first_seen_at)) * dir;\n    });\n    return list;\n  }\n\n  _open(id) { this.setState({ view: 'detail', detailId: id }); }\n  _stepDetail(delta) {\n    const rows = this._filteredAds();\n    const idx = rows.findIndex(a => a.ad_archive_id === this.state.detailId);\n    const next = rows[Math.min(rows.length - 1, Math.max(0, idx + delta))];\n    if (next) this.setState({ detailId: next.ad_archive_id });\n  }\n  _toggleFilter(group, val) {\n    this.setState(s => {\n      const arr = s.filters[group];\n      const nx = arr.includes(val) ? arr.filter(x => x !== val) : [...arr, val];\n      return { filters: { ...s.filters, [group]: nx }, selIndex: 0 };\n    });\n  }\n  _update(id, patch) { this.ads = this.ads.map(a => a.ad_archive_id === id ? { ...a, ...patch } : a); this.forceUpdate(); }\n\n  // ---------- render ----------\n  renderVals() {\n    if (!this.ads) return { isFresh: true, navTabs: [], metrics: [], vertMix: [], filterGroups: [], dateRanges: [], sortOptions: [], rows: [], resultCount: 0, lastScrape: '', clearColor: '#5A5E64', activeFilterCount: 0 };\n    const S = this.state;\n    const A = '#E8A33D';\n    const views = [\n      { id: 'fresh', label: 'Fresh Finds' },\n      { id: 'competitor', label: 'Competitor' },\n      { id: 'pipeline', label: 'Pipeline' },\n      { id: 'settings', label: 'Control Room' },\n    ];\n    const navTabs = views.map(v => ({\n      label:
