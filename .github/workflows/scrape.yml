name: scrape

# Hourly self-checking runner. run_scrape.py exits immediately when no domain is
# due (based on each domain's cadence in the DB), so most hourly runs cost ~nothing.
# Change cadence per domain in the dashboard's Control Room, not here.
on:
  schedule:
    - cron: '17 * * * *'   # hourly, offset off :00 to be polite to the API
  workflow_dispatch: {}     # manual "Run workflow" button

concurrency:
  group: scrape
  cancel-in-progress: false  # never run two scrapes at once (belt with the DB run-lock)

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run due scrapes
        run: python run_scrape.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          SCRAPINGBEE_API_KEY: ${{ secrets.SCRAPINGBEE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
          GCS_CLIENT_EMAIL: ${{ secrets.GCS_CLIENT_EMAIL }}
          GCS_CLIENT_ID: ${{ secrets.GCS_CLIENT_ID }}
          GCS_PRIVATE_KEY: ${{ secrets.GCS_PRIVATE_KEY }}
          GCS_PRIVATE_KEY_ID: ${{ secrets.GCS_PRIVATE_KEY_ID }}
