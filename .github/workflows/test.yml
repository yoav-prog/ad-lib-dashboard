name: test

# Runs the Python test suite on every PR and push to main, so a regression in
# the scraper's loop-liveness or time-budget guarantees can never merge quietly.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest -v
