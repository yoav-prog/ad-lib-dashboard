name: backfill-video-urls

# One-off repair job, run by hand from the Actions tab. Restores video links
# that pre-fix re-scrapes dropped (see backfill_video_urls.py for the story).
# Defaults to a dry run: check the log first, then re-run with dry run off.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print changes, write nothing)'
        type: boolean
        default: true

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Restore missing video links
        run: python backfill_video_urls.py ${{ inputs.dry_run && '--dry-run' || '' }}
        env:
          PYTHONUNBUFFERED: '1'
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
